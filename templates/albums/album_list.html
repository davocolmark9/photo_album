{% extends 'base.html' %}

{% block content %}

<div class="hero">
    <h1>My Photo Albums</h1>
    <p class="text-muted">Capture memories beautifully.</p>

    <a href="{% url 'album_create' %}" class="btn btn-primary btn-lg mt-3">
        Create Album
    </a>
</div>

<div class="row">
    {% for album in albums %}

    <div class="col-md-4 mb-4">
        <div class="card album-card">

            {% if album.photos.first %}
                <img src="{{ album.photos.first.image.url }}"
                     class="card-img-top album-cover">
            {% endif %}

            <div class="card-body">
                <h4>{{ album.title }}</h4>
                <p>{{ album.description|truncatewords:15 }}</p>

                <a href="{% url 'album_detail' album.pk %}"
                   class="btn btn-dark">
                    View Album
                </a>
            </div>
        </div>
    </div>

    {% endfor %}
</div>

{% endblock %}
