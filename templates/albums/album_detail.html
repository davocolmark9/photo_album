{% extends 'base.html' %}

{% block content %}

<div class="d-flex justify-content-between align-items-center">
    <h1>{{ object.title }}</h1>

  <a href="{% url 'photo_upload' album_pk=object.pk %}" class="btn btn-primary">Upload Photo</a>
</div>

<p class="text-muted">{{ object.description }}</p>

<div class="row mt-4">
{% for photo in object.photos.all %}
    <div class="col-md-4 mb-4">
        <div class="card p-2">
            <img src="{{ photo.image.url }}" class="img-fluid">
            <p class="mt-2">{{ photo.caption }}</p>
        </div>
    </div>
{% endfor %}
</div>

{% endblock %}
