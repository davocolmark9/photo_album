{% extends 'base.html' %}

{% block title %}Upload Photo - PhotoAlbum{% endblock %}

{% block content %}
<div class="row justify-content-center animate-in">
    <div class="col-md-8 col-lg-6">
        <div class="card p-4 p-md-5">
            <div class="text-center mb-4">
                <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-3" 
                     style="width: 70px; height: 70px; background: linear-gradient(135deg, #10b981, #059669);">
                    <i class="fas fa-cloud-upload-alt text-white fa-lg"></i>
                </div>
                <h3 class="fw-bold">Upload Photo</h3>
                <p class="text-muted mb-0">to <strong>{{ view.album.title }}</strong></p>
            </div>
            
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="mb-4">
                    <label class="form-label fw-medium">Choose Image</label>
                    <input type="file" name="image" class="form-control" accept="image/*" required>
                    <div class="form-text">Supported formats: JPG, PNG, GIF, WebP</div>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-medium">Caption <span class="text-muted">(optional)</span></label>
                    <input type="text" name="caption" class="form-control" placeholder="Add a description for this photo...">
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary flex-fill">
                        <i class="fas fa-upload me-2"></i>Upload Photo
                    </button>
                    <a href="{% url 'album_detail' pk=view.album.pk %}" class="btn btn-outline-secondary">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
