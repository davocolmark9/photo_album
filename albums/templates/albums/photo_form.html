{% extends 'base.html' %}

{% block title %}Upload Photo - PhotoAlbum{% endblock %}

{% block content %}
<div class="row justify-content-center animate-in">
    <div class="col-md-8 col-lg-6">
        <div class="card p-0 overflow-hidden">
            <!-- Header Banner -->
            <div class="p-4 p-md-5 text-white position-relative overflow-hidden" 
                 style="background: linear-gradient(135deg, #10b981, #059669);">
                <div class="position-relative" style="z-index: 1;">
                    <div class="d-flex align-items-center mb-3">
                        <div class="rounded-circle d-flex align-items-center justify-content-center me-3"
                             style="width: 60px; height: 60px; background: rgba(255,255,255,0.2);">
                            <i class="fas fa-cloud-upload-alt fa-lg"></i>
                        </div>
                        <div>
                            <h3 class="fw-bold mb-0">Upload Photo</h3>
                            <p class="mb-0 opacity-75">to <strong>{{ view.album.title }}</strong></p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="p-4 p-md-5">
                <form method="post" enctype="multipart/form-data" action="">
                    {% csrf_token %}
                    
                    <!-- File Upload -->
                    <div class="mb-4">
                        <label class="form-label fw-bold">
                            <i class="fas fa-image me-2 text-warning"></i>Choose Image
                        </label>
                        <input type="file" name="image" class="form-control form-control-lg" 
                               accept="image/*" required>
                        <div class="form-text">JPG, PNG, GIF, WebP supported</div>
                    </div>

                    <!-- Caption -->
                    <div class="mb-4">
                        <label class="form-label fw-bold">
                            <i class="fas fa-quote-left me-2 text-danger"></i>Caption <span class="text-muted">(optional)</span>
                        </label>
                        <input type="text" name="caption" class="form-control form-control-lg" 
                               placeholder="What's the story behind this photo?">
                    </div>

                    <!-- Action Buttons -->
                    <div class="d-flex gap-3">
                        <button type="submit" class="btn btn-success btn-lg flex-fill">
                            <i class="fas fa-upload me-2"></i>Upload Photo
                        </button>
                        <a href="{% url 'album_detail' pk=view.album.pk %}" class="btn btn-outline-secondary btn-lg">
                            Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
