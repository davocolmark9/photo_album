{% extends 'base.html' %}

{% block title %}Login - PhotoAlbum{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-5 col-lg-4 animate-in">
        <div class="card p-4">
            <div class="text-center mb-4">
                <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-3" 
                     style="width: 80px; height: 80px; background: linear-gradient(135deg, var(--primary), var(--secondary));">
                    <i class="fas fa-user-circle text-white fa-2x"></i>
                </div>
                <h3 class="fw-bold">Welcome Back</h3>
                <p class="text-muted">Sign in to your photo collection</p>
            </div>
            
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-medium">Username</label>
                    <input type="text" name="username" class="form-control" placeholder="Enter your username" required autofocus>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-medium">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 mb-3">
                    <i class="fas fa-sign-in-alt me-2"></i>Sign In
                </button>
            </form>
            
            <div class="text-center">
                <p class="text-muted mb-0">Don't have an account? 
                    <a href="{% url 'signup' %}" class="text-decoration-none fw-bold" style="color: var(--primary);">Create one</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
