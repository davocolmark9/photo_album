<!DOCTYPE html>
<html>
<head>
    <title>Login - Photo Album</title>
    <style>
        body { font-family: sans-serif; max-width: 400px; margin: 100px auto; }
        input { display: block; width: 100%; margin: 10px 0; padding: 10px; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; cursor: pointer; }
        .error { color: red; }
    </style>
</head>
<body>
    <h2>Login</h2>
    {% if form.errors %}
        <p class="error">Invalid username or password.</p>
    {% endif %}
    <form method="post">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
    <p><small>You need a superuser or staff account to access this app.</small></p>
</body>
</html>
