{% extends 'base.html' %}

{% block title %}{% if object %}Edit{% else %}Create{% endif %} Album - PhotoAlbum{% endblock %}

{% block content %}
<div class="row justify-content-center animate-in">
    <div class="col-md-8 col-lg-6">
        <div class="card p-4 p-md-5">
            <div class="text-center mb-4">
                <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-3" 
                     style="width: 70px; height: 70px; background: linear-gradient(135deg, var(--primary), var(--secondary));">
                    <i class="fas fa-{% if object %}edit{% else %}plus{% endif %} text-white fa-lg"></i>
                </div>
                <h3 class="fw-bold">{% if object %}Edit Album{% else %}Create New Album{% endif %}</h3>
            </div>
            
            <form method="post">
                {% csrf_token %}
                <div class="mb-4">
                    <label class="form-label fw-medium">Album Title</label>
                    <input type="text" name="title" class="form-control" value="{{ object.title|default:'' }}" 
                           placeholder="e.g., Summer Vacation 2024" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-medium">Description</label>
                    <textarea name="description" class="form-control" rows="4" 
                              placeholder="Describe what this album is about...">{{ object.description|default:'' }}</textarea>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary flex-fill">
                        <i class="fas fa-save me-2"></i>{% if object %}Save Changes{% else %}Create Album{% endif %}
                    </button>
                    <a href="{% url 'album_list' %}" class="btn btn-outline-secondary">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
